name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  cargo:
    name: cargo check + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install sqlx-cli
        if: runner.os == 'Linux'
        run: cargo install sqlx-cli --version 0.8.6 --no-default-features --features sqlite,rustls --locked

      - name: Verify SQLx offline metadata
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/prepare-sqlx.sh --check

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: Layer gate (structural lints)
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/layer-gate.sh

      - name: Contract spec sha256 gate
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/sync-contract.sh --check

      - name: cargo check (workspace)
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --workspace --all-targets

      - name: Verify plugin distribution manifests
        run: cargo run -p difflore-cli -- dist verify

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo nextest run
        env:
          RUSTFLAGS: -D warnings
        run: cargo nextest run --workspace --all-targets --profile ci

      - name: cargo test --doc
        run: cargo test --workspace --doc
