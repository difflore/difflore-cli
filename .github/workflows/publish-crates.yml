name: Publish crates

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not actually publish)"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  SQLX_OFFLINE: "true"

jobs:
  publish:
    name: Publish workspace crates to crates.io
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Refuse publish outside a vX.Y.Z tag
        if: ${{ env.DRY_RUN != 'true' && !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "::error::Publishing requires running this workflow from a vX.Y.Z tag."
          exit 1

      - name: Verify tag matches CLI crate version
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cli_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "difflore-cli") | .version')"
          echo "Tag:        ${tag_version}"
          echo "difflore-cli: ${cli_version}"
          if [ "${tag_version}" != "${cli_version}" ]; then
            echo "::error::Tag ${tag_version} does not match difflore-cli version ${cli_version}"
            exit 1
          fi

      - name: Resolve crate versions
        id: crate-versions
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(cargo metadata --no-deps --format-version=1)"
          echo "core=$(jq -r '.packages[] | select(.name == "difflore-core") | .version' <<<"${metadata}")" >> "$GITHUB_OUTPUT"
          echo "cli=$(jq -r '.packages[] | select(.name == "difflore-cli") | .version' <<<"${metadata}")" >> "$GITHUB_OUTPUT"

      - name: Check crates.io publish status
        id: crates-status
        shell: bash
        run: |
          set -euo pipefail
          crate_index_path() {
            local crate="$1"
            local len="${#crate}"
            if [ "${len}" -eq 1 ]; then
              echo "1/${crate}"
            elif [ "${len}" -eq 2 ]; then
              echo "2/${crate}"
            elif [ "${len}" -eq 3 ]; then
              echo "3/${crate:0:1}/${crate}"
            else
              echo "${crate:0:2}/${crate:2:2}/${crate}"
            fi
          }

          check_version() {
            local crate="$1"
            local version="$2"
            local path
            local status
            local body
            path="$(crate_index_path "${crate}")"
            body="$(mktemp)"
            if ! status="$(curl --silent --show-error --location --user-agent "difflore-cli-release" --write-out "%{http_code}" --output "${body}" "https://index.crates.io/${path}")"; then
              cat "${body}" >&2 || true
              rm -f "${body}"
              echo "::error::Failed to query crates.io index for ${crate}" >&2
              exit 1
            fi
            if [ "${status}" = "200" ]; then
              if jq -e --arg version "${version}" 'select(.vers == $version)' "${body}" >/dev/null; then
                rm -f "${body}"
                echo "true"
              else
                rm -f "${body}"
                echo "false"
              fi
            elif [ "${status}" = "404" ]; then
              rm -f "${body}"
              echo "false"
            else
              cat "${body}" >&2 || true
              rm -f "${body}"
              echo "::error::Failed to query crates.io index for ${crate}; HTTP ${status}" >&2
              exit 1
            fi
          }

          core_published="$(check_version difflore-core "${{ steps.crate-versions.outputs.core }}")"
          cli_published="$(check_version difflore-cli "${{ steps.crate-versions.outputs.cli }}")"

          echo "core=${core_published}" >> "$GITHUB_OUTPUT"
          echo "cli=${cli_published}" >> "$GITHUB_OUTPUT"
          echo "difflore-core published: ${core_published}"
          echo "difflore-cli published: ${cli_published}"

      - name: Package difflore-core
        if: ${{ env.DRY_RUN == 'true' || steps.crates-status.outputs.core != 'true' }}
        run: cargo package -p difflore-core

      - name: Skip publish when all crates already exist
        if: ${{ env.DRY_RUN != 'true' && steps.crates-status.outputs.core == 'true' && steps.crates-status.outputs.cli == 'true' }}
        run: echo "difflore-core and difflore-cli are already published; nothing to do."

      - name: Package workspace dry run
        if: ${{ env.DRY_RUN == 'true' }}
        run: cargo package --workspace --no-verify

      - name: Resolve crates.io auth mode
        if: ${{ env.DRY_RUN != 'true' && (steps.crates-status.outputs.core != 'true' || steps.crates-status.outputs.cli != 'true') }}
        id: crates-auth-mode
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "has_static_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_static_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io Trusted Publishing
        if: ${{ env.DRY_RUN != 'true' && steps.crates-auth-mode.outputs.has_static_token != 'true' && (steps.crates-status.outputs.core != 'true' || steps.crates-status.outputs.cli != 'true') }}
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish difflore-core
        if: ${{ env.DRY_RUN != 'true' && steps.crates-status.outputs.core != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.crates-auth.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          if cargo publish -p difflore-core 2>&1 | tee publish.log; then
            exit 0
          fi
          if grep -qiE "already exists|already uploaded" publish.log; then
            echo "::notice::difflore-core is already published; treating this publish as a no-op."
            exit 0
          fi
          exit 1

      - name: Wait for crates.io to index difflore-core
        if: ${{ env.DRY_RUN != 'true' && steps.crates-status.outputs.core != 'true' && steps.crates-status.outputs.cli != 'true' }}
        run: sleep 60

      - name: Package difflore-cli
        if: ${{ env.DRY_RUN != 'true' && steps.crates-status.outputs.cli != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..20}; do
            if cargo package -p difflore-cli; then
              exit 0
            fi
            echo "::warning::difflore-core is not visible in the crates.io index yet; retrying (${attempt}/20)."
            sleep 30
          done
          exit 1

      - name: Publish difflore-cli
        if: ${{ env.DRY_RUN != 'true' && steps.crates-status.outputs.cli != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.crates-auth.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          if cargo publish -p difflore-cli 2>&1 | tee publish.log; then
            exit 0
          fi
          if grep -qiE "already exists|already uploaded" publish.log; then
            echo "::notice::difflore-cli is already published; treating this publish as a no-op."
            exit 0
          fi
          exit 1
