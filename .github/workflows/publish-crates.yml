name: Publish crates

permissions:
  contents: read
  id-token: write

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
      dry_run:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not actually publish)"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  HAS_CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
  RUST_BACKTRACE: short
  SQLX_OFFLINE: "true"

jobs:
  publish:
    name: Publish workspace crates to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Refuse manual publish outside a release tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == false && !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "::error::Publishing requires running this workflow from a vX.Y.Z tag."
          exit 1

      - name: Verify tag matches CLI crate version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cli_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "difflore-cli") | .version')"
          echo "Tag:        ${tag_version}"
          echo "difflore-cli: ${cli_version}"
          if [ "${tag_version}" != "${cli_version}" ]; then
            echo "::error::Tag ${tag_version} does not match difflore-cli version ${cli_version}"
            exit 1
          fi

      - name: Resolve crate versions
        id: crate-versions
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(cargo metadata --no-deps --format-version=1)"
          echo "core=$(jq -r '.packages[] | select(.name == "difflore-core") | .version' <<<"${metadata}")" >> "$GITHUB_OUTPUT"
          echo "tui=$(jq -r '.packages[] | select(.name == "difflore-tui") | .version' <<<"${metadata}")" >> "$GITHUB_OUTPUT"
          echo "cli=$(jq -r '.packages[] | select(.name == "difflore-cli") | .version' <<<"${metadata}")" >> "$GITHUB_OUTPUT"

      - name: Check crates.io publish status
        id: crates-status
        shell: bash
        run: |
          set -euo pipefail
          check_version() {
            local crate="$1"
            local version="$2"
            if curl --fail --silent --show-error "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null; then
              echo "true"
            else
              echo "false"
            fi
          }

          core_published="$(check_version difflore-core "${{ steps.crate-versions.outputs.core }}")"
          tui_published="$(check_version difflore-tui "${{ steps.crate-versions.outputs.tui }}")"
          cli_published="$(check_version difflore-cli "${{ steps.crate-versions.outputs.cli }}")"

          echo "core=${core_published}" >> "$GITHUB_OUTPUT"
          echo "tui=${tui_published}" >> "$GITHUB_OUTPUT"
          echo "cli=${cli_published}" >> "$GITHUB_OUTPUT"
          echo "difflore-core published: ${core_published}"
          echo "difflore-tui published: ${tui_published}"
          echo "difflore-cli published: ${cli_published}"

      - name: Package difflore-core
        run: cargo package -p difflore-core

      - name: Package workspace dry run
        if: ${{ inputs.dry_run == true }}
        run: cargo package --workspace --no-verify

      - name: Authenticate with crates.io Trusted Publishing
        if: ${{ inputs.dry_run == false && env.HAS_CARGO_REGISTRY_TOKEN != 'true' && (steps.crates-status.outputs.core != 'true' || steps.crates-status.outputs.tui != 'true' || steps.crates-status.outputs.cli != 'true') }}
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish difflore-core
        if: ${{ inputs.dry_run == false && steps.crates-status.outputs.core != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.crates-auth.outputs.token }}
        run: cargo publish -p difflore-core

      - name: Wait for crates.io to index difflore-core
        if: ${{ inputs.dry_run == false && steps.crates-status.outputs.tui != 'true' }}
        run: sleep 60

      - name: Package difflore-tui
        if: ${{ inputs.dry_run == false && steps.crates-status.outputs.tui != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..20}; do
            if cargo package -p difflore-tui; then
              exit 0
            fi
            echo "::warning::difflore-core is not visible in the crates.io index yet; retrying (${attempt}/20)."
            sleep 30
          done
          exit 1

      - name: Publish difflore-tui
        if: ${{ inputs.dry_run == false && steps.crates-status.outputs.tui != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.crates-auth.outputs.token }}
        run: cargo publish -p difflore-tui

      - name: Wait for crates.io to index difflore-tui
        if: ${{ inputs.dry_run == false && steps.crates-status.outputs.cli != 'true' }}
        run: sleep 60

      - name: Package difflore-cli
        if: ${{ inputs.dry_run == false && steps.crates-status.outputs.cli != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..20}; do
            if cargo package -p difflore-cli; then
              exit 0
            fi
            echo "::warning::difflore-tui is not visible in the crates.io index yet; retrying (${attempt}/20)."
            sleep 30
          done
          exit 1

      - name: Publish difflore-cli
        if: ${{ inputs.dry_run == false && steps.crates-status.outputs.cli != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.crates-auth.outputs.token }}
        run: cargo publish -p difflore-cli
