<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">DiffLore local quickstart terminal demo</title>
  <desc id="desc">A terminal-style demo showing a local rule being remembered, searched, and inspected without cloud.</desc>
  <rect width="920" height="420" rx="10" fill="#111318"/>
  <rect x="1" y="1" width="918" height="418" rx="10" fill="none" stroke="#303744"/>
  <circle cx="26" cy="24" r="6" fill="#ff6b6b"/>
  <circle cx="48" cy="24" r="6" fill="#feca57"/>
  <circle cx="70" cy="24" r="6" fill="#1dd1a1"/>
  <text x="460" y="29" text-anchor="middle" fill="#9aa4b2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">difflore local quickstart</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">
    <text x="32" y="72" fill="#8bd5ff">$ difflore rules remember --title "Use Mapping for request headers" \</text>
    <text x="56" y="98" fill="#8bd5ff">--body "Accept Mapping[str, str] when code only reads headers." \</text>
    <text x="56" y="124" fill="#8bd5ff">--file-pattern "src/**/*.py"</text>
    <text x="32" y="158" fill="#a6e3a1">saved</text>
    <text x="92" y="158" fill="#d6deeb">conv-use-mapping-for-request-headers-a18f03c9</text>
    <text x="32" y="202" fill="#8bd5ff">$ difflore search "update request header helper" --file src/http/headers.py --top-k 3</text>

    <rect x="32" y="226" width="856" height="108" rx="6" fill="#171b22" stroke="#2b3440"/>
    <text x="54" y="258" fill="#f9e2af">1.</text>
    <text x="86" y="258" fill="#d6deeb">Use Mapping for request headers</text>
    <text x="54" y="286" fill="#9aa4b2">origin=conversation  confidence=0.91  match=file-pattern + semantic</text>
    <text x="54" y="314" fill="#cdd6f4">When a function only reads headers, accept Mapping[str, str] instead of dict[str, str].</text>

    <text x="32" y="370" fill="#8bd5ff">$ difflore</text>
    <text x="132" y="370" fill="#a6e3a1">opens local TUI: Rules / Activity / Team / Settings</text>
  </g>
</svg>
